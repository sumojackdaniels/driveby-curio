name: DriveByCurio
options:
  bundleIdPrefix: com.enolabs
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

packages:
  core-swift:
    url: https://github.com/sumojackdaniels/core-swift.git
    branch: main

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_ROTATION: true

targets:
  DriveByCurio:
    type: application
    platform: iOS
    sources:
      - path: DriveByCurio
        excludes:
          - "**/*.md"
    entitlements:
      path: DriveByCurio/Entitlements.plist
      properties:
        com.apple.developer.carplay-audio: true
    dependencies:
      - package: core-swift
        product: CoreSwift
      - sdk: CarPlay.framework
      - sdk: MapKit.framework
      - sdk: AVFoundation.framework
    settings:
      base:
        PRODUCT_NAME: DriveByCurio
        INFOPLIST_KEY_CFBundleDisplayName: "DriveByCurio"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: M499SW6975
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Ad-hoc sign simulator builds so restricted entitlements
        # (carplay-driving-task) aren't stripped by Automatic signing.
        "CODE_SIGN_IDENTITY[sdk=iphonesimulator*]": "-"
    info:
      path: DriveByCurio/Info.plist
      properties:
        UIApplicationSceneManifest:
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneClassName: UIWindowScene
                UISceneConfigurationName: PhoneSceneConfiguration
                UISceneDelegateClassName: "$(PRODUCT_MODULE_NAME).PhoneSceneDelegate"
            CPTemplateApplicationSceneSessionRoleApplication:
              - UISceneClassName: CPTemplateApplicationScene
                UISceneConfigurationName: CarPlaySceneConfiguration
                UISceneDelegateClassName: "$(PRODUCT_MODULE_NAME).CarPlaySceneDelegate"
        UIBackgroundModes:
          - location
          - audio
        NSLocationWhenInUseUsageDescription: "DriveByCurio uses your location to play audio stories about the places you're passing on a guided tour."
        NSLocationAlwaysAndWhenInUseUsageDescription: "DriveByCurio plays audio stories about places along your tour route even when the app is in the background — for example, while Apple Maps is showing directions on your CarPlay screen."
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UIApplicationSupportsMultipleScenes: true

  DriveByCurioTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DriveByCurioTests
    dependencies:
      - target: DriveByCurio
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/DriveByCurio.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/DriveByCurio"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: true
