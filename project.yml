name: DriveByCurio
options:
  bundleIdPrefix: com.enolabs
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

packages:
  core-swift:
    url: https://github.com/sumojackdaniels/core-swift.git
    branch: main

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_ROTATION: true

targets:
  DriveByCurio:
    type: application
    platform: iOS
    sources:
      - path: DriveByCurio
        excludes:
          - "**/*.md"
          - "WalkingTours"
      - path: DriveByCurio/WalkingTours
        type: folder
    dependencies:
      - package: core-swift
        product: CoreSwift
      - sdk: MapKit.framework
      - sdk: AVFoundation.framework
    settings:
      base:
        PRODUCT_NAME: DriveByCurio
        INFOPLIST_KEY_CFBundleDisplayName: "DriveByCurio"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: M499SW6975
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: DriveByCurio/Info.plist
      properties:
        UIApplicationSceneManifest:
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneClassName: UIWindowScene
                UISceneConfigurationName: PhoneSceneConfiguration
                UISceneDelegateClassName: "$(PRODUCT_MODULE_NAME).PhoneSceneDelegate"
        UIBackgroundModes:
          - location
          - audio
        NSLocationWhenInUseUsageDescription: "DriveByCurio uses your location to play audio stories at the right spot as you walk a tour."
        NSLocationAlwaysAndWhenInUseUsageDescription: "DriveByCurio plays audio stories about places along your walking tour even when the app is in the background or your screen is off."
        NSMicrophoneUsageDescription: "DriveByCurio uses the microphone so you can record audio narration for walking tours you create."
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UIApplicationSupportsMultipleScenes: false
